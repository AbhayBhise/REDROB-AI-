ai_tools_used:
  - "Antigravity (Google DeepMind AI coding assistant)"

ai_usage_summary: |
  Used Antigravity AI assistant for code review, architectural guidance, and
  debugging environment compatibility issues (NumPy/PyTorch version conflicts).
  All ranking logic, feature engineering decisions, and scoring weights were
  designed by the team. No candidate data was fed to any external LLM during
  ranking — the pipeline is fully offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage hybrid ranking pipeline for 100K candidates against a Senior AI
  Engineer JD. Stage 1 (offline): BAAI/bge-small-en-v1.5 generates 384-dim
  embeddings for all candidates and saves to disk (~90 min, done once).
  Stage 2 (ranking, ~37s): Loads precomputed embeddings, embeds the JD once,
  computes BM25 over structured candidate text, runs a 9-component MasterScore
  (skill match, experience band, production evidence, behavioral signals,
  title relevance, location, education tier, certifications, notice period),
  then fuses: 0.40 × Semantic + 0.25 × BM25 + 0.35 × Master. Key insight:
  dense retrieval has low variance (std=0.026) across AI/ML profiles, so BM25
  and engineered features do the fine-grained discrimination. Honeypot
  detection flags 83 synthetic profiles. Consulting-only careers penalized
  per JD explicit guidance. Output: Top 100, fully deterministic, validated.

